# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core apps to Azure Web Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build with dotnet
        run: dotnet build EcommercePlatform.sln --configuration Release

      - name: dotnet publish Web
        run: dotnet publish src/EcommercePlatform.Web/EcommercePlatform.Web.csproj -c Release -o "${{env.DOTNET_ROOT}}/web-app"

      - name: Upload artifact for Web deployment job
        uses: actions/upload-artifact@v4
        with:
          name: web-app
          path: ${{env.DOTNET_ROOT}}/web-app

      - name: dotnet publish InventoryScanner
        run: dotnet publish src/EcommercePlatform.InventoryScanner/EcommercePlatform.InventoryScanner.csproj -c Release -o "${{env.DOTNET_ROOT}}/inventory-scanner-app"

      - name: Upload artifact for InventoryScanner deployment job
        uses: actions/upload-artifact@v4
        with:
          name: inventory-scanner-app
          path: ${{env.DOTNET_ROOT}}/inventory-scanner-app

  deploy-web:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: web-app
          path: ./web-app-artifact

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A2488CF7DD1546A783FC38079B360505 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C167ABF3D0DB468E9D679A1552FC3C6E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_66AAEA3A242C4410A9B58BF138EA7BAD }}

      - name: Get DefaultConnection from Azure App Service
        run: |
          RG=$(az webapp list --query "[?name=='ecommerce-app'].resourceGroup | [0]" -o tsv)
          CONN_STR=$(az webapp config connection-string list \
            --name ecommerce-app \
            --resource-group "$RG" \
            --query "[?name=='DefaultConnection'].value | [0]" -o tsv)
          echo "::add-mask::$CONN_STR"
          echo "DEFAULT_CONNECTION=$CONN_STR" >> $GITHUB_ENV

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef --version 8.0.0

      - name: Run database migrations
        env:
          ConnectionStrings__DefaultConnection: ${{ env.DEFAULT_CONNECTION }}
        run: dotnet-ef database update --project src/EcommercePlatform.Infrastructure --startup-project src/EcommercePlatform.Web

      - name: Deploy Web to Azure Web App
        id: deploy-web-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ecommerce-app'
          slot-name: 'Production'
          package: ./web-app-artifact

  deploy-inventory-scanner:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: inventory-scanner-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B1FDA7BC6EC94F788C1246A4967FB6A4 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A3F377FA62FC487684EFF487B8A4EF8D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D8F38CC92B4244AF886367D06F4EA920 }}

      - name: Deploy InventoryScanner to Azure Web App
        id: deploy-inventory-scanner-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ecommerce-inventory-scanner'
          slot-name: 'Production'
          package: .
          